name: Update AWS CLI

on:
  schedule:
    - cron: "0 0 1 */3 *" # every 3 months (January, April, July, and October)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Determine latest AWS CLI 2.x version
        id: awscli
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            // aws/aws-cli has no GitHub Releases; tags are the source of truth.
            // The tags endpoint returns newest-first, so the latest 2.x is within
            // the first page — no need to paginate the full (huge) tag history.
            const { data: tags } = await github.rest.repos.listTags({
              owner: 'aws',
              repo: 'aws-cli',
              per_page: 100,
            });

            const latest = tags
              .map((t) => t.name)
              .filter((name) => /^2\.\d+\.\d+$/.test(name))
              .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))
              .pop();

            if (!latest) {
              core.setFailed('No AWS CLI 2.x tag found');
              return;
            }
            core.setOutput('version', latest);
      - name: Update awscli.sh
        env:
          VERSION: ${{ steps.awscli.outputs.version }}
        run: |
          sed -i -E "s/(AWSCLI_VERSION:-)[0-9.]+/\1${VERSION}/" scripts/awscli.sh
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.token.outputs.token }}
          branch: update-awscli
          commit-message: "chore: bump AWSCLI_VERSION to ${{ steps.awscli.outputs.version }}"
          title: "chore: bump AWSCLI_VERSION to ${{ steps.awscli.outputs.version }}"
          body: |
            Bumps the default `AWSCLI_VERSION` in `scripts/awscli.sh` to the latest
            AWS CLI 2.x release (`${{ steps.awscli.outputs.version }}`).

            Opened automatically by the **Update AWS CLI** workflow.
